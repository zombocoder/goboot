name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      # Build golangci-lint from source with this Go toolchain: a prebuilt binary
      # built with an older Go cannot analyze go1.25 code.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Lint all modules
        run: |
          LINT="$(go env GOPATH)/bin/golangci-lint"
          CFG="$GITHUB_WORKSPACE/.golangci.yml"
          fail=0
          for dir in . adapters/otel adapters/pgx adapters/prometheus \
                     plugins/lint plugins/openapi plugins/oracle; do
            echo "== $dir =="
            (cd "$dir" && "$LINT" run --config "$CFG" ./...) || fail=1
          done
          exit $fail
