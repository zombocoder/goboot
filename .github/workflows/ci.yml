name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      # Plugin and adapter submodules live under plugins/*/ and adapters/*/ with
      # their own go.mod, so the root `go build/test ./...` does not reach them.
      # Build and test each nested module.
      - name: Nested modules
        run: |
          for mod in plugins/*/go.mod adapters/*/go.mod; do
            [ -e "$mod" ] || continue
            dir=$(dirname "$mod")
            echo "== $dir =="
            (cd "$dir" && test -z "$(gofmt -l .)" && go vet ./... && go test ./...)
          done

  fuzz-smoke:
    name: fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      # Run each fuzz target briefly to catch panics on new inputs.
      - name: Fuzz annotation parser
        run: go test ./annotation/ -run '^$' -fuzz FuzzParseComment -fuzztime 20s
      - name: Fuzz SQL compiler
        run: go test ./sqlgen/ -run '^$' -fuzz FuzzCompile -fuzztime 20s
      - name: Fuzz path-template builder
        run: go test ./compiler/ -run '^$' -fuzz FuzzJoinPath -fuzztime 20s
      - name: Fuzz config-key env mapping
        run: go test ./runtime/config/ -run '^$' -fuzz FuzzEnvName -fuzztime 20s
      - name: Fuzz config list parser
        run: go test ./runtime/config/ -run '^$' -fuzz FuzzSplitList -fuzztime 20s

  coverage:
    name: coverage floors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: Enforce coverage floors
        run: ./scripts/coverage-gate.sh

  vscode-grammar:
    name: vscode grammar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Tokenize sample annotations and assert the grammar's scopes.
      - name: Grammar tokenization test
        working-directory: editors/vscode/test
        run: |
          npm ci
          node tokenize.js
